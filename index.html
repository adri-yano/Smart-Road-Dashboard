<!DOCTYPE html>
<html>
<head>
  <title>Smart Road System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="login-bg">

<div class="login-box">

  <h1>🌱 Smart Road System</h1>
  <p class="subtitle">Clean Roads • Smart Water • Green Cities</p>

  <!-- BACK BUTTON -->
  <div id="backArrow" onclick="goBack()" style="display:none;">
    <i class="fa-solid fa-arrow-left"></i> Back
  </div>

  <!-- BUTTONS -->
  <div id="buttons">
    <button onclick="showLogin()">Login</button>
    <button onclick="showSignup()">Signup</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm" style="display:none;">
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" style="display:none;">
    <input id="signupUser" placeholder="New Username">
    <input id="signupPass" type="password" placeholder="New Password">
    <button onclick="signup()">Signup</button>
  </div>

  <p id="msg"></p>

</div>

<script src="js/auth.js"></script>
</body>
</html>
