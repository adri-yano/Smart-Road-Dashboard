<!DOCTYPE html>
<html>
<head>
  <title>Smart Road Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Smart Road System Dashboard</h1>
<p class="subtitle">Simulation of Rainwater-Based Cleaning and Irrigation System</p>

<div class="container">

  <div class="box">
    <h2>Rain System</h2>
    <button onclick="toggleRain()">Toggle Rain</button>
    <p id="rainStatus" class="status-off">Rain: OFF</p>
  </div>

  <div class="box">
    <h2>Water Level</h2>
    <div class="bar-container">
      <div id="waterBar" class="bar"></div>
    </div>
    <p id="waterValue">50%</p>
  </div>

  <div class="box">
    <h2>System Control Panel</h2>
    <button onclick="startCleaning()">Start Cleaning</button>
    <button onclick="startIrrigation()">Start Irrigation</button>
    <button onclick="resetSystem()">Reset</button>
  </div>

  <div class="box">
    <h2>Status</h2>
    <p id="cleaning" class="status-off">Cleaning: OFF</p>
    <p id="irrigation" class="status-off">Irrigation: OFF</p>
  </div>

  <div class="box">
    <h2>System Info</h2>
    <p id="systemInfo">System running normally</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
